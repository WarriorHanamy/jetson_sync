# VIO to MAVROS Odometry Converter
#
# This node converts VIO odometry from FLU frame to MAVROS-compatible FRD frame.
#
# Topic remapping is done via launch file <remap> tag:
#   - Input:  ~odom (remapped from /vio/odom by default)
#   - Output: /mavros/odometry/out (fixed)
#
# Frame transforms (FLU -> FRD):
#   - Position:      (x, y, z) -> (x, -y, -z)
#   - Linear vel:    (x, y, z) -> (x, -y, -z)
#   - Angular vel:   (x, y, z) -> (x, -y, -z)
#   - Orientation:   (w, x, y, z) -> (w, x, -y, -z)
#
# Usage:
#   roslaunch simple_px4_odom vio_to_mavros_odom.launch input_odom:=/your/vio/topic
